{% extends "base.html" %}
{% block title %}New Job — ptq{% endblock %}
{% block content %}
<h1>Launch New Job</h1>

{% if error %}
<article class="error-banner">{{ error }}</article>
{% endif %}

<form method="post" action="/jobs">
  <fieldset>
    <legend>Task</legend>
    <label><input type="radio" name="task_type" value="issue" checked onchange="toggleTask(this)"> GitHub Issue</label>
    <label><input type="radio" name="task_type" value="adhoc" onchange="toggleTask(this)"> Ad-hoc Message</label>

    <div id="issue-field">
      <label for="issue">Issue Number
        <input type="number" id="issue" name="issue" placeholder="e.g. 174923">
      </label>
    </div>

    <div id="message-field" hidden>
      <label for="message">Message
        <textarea id="message" name="message" rows="4" placeholder="Describe the task..."></textarea>
      </label>
    </div>
  </fieldset>

  <fieldset>
    <legend>Target</legend>
    <label><input type="radio" name="target_type" value="local" checked onchange="toggleTarget(this)"> Local</label>
    <label><input type="radio" name="target_type" value="machine" onchange="toggleTarget(this)"> Remote Machine</label>

    <div id="machine-field" hidden>
      {% if machines %}
      <label for="machine">Machine
        <select id="machine" name="machine">
          <option value="">— select —</option>
          {% for m in machines %}
          <option value="{{ m }}">{{ m }}</option>
          {% endfor %}
        </select>
      </label>
      {% else %}
      <label for="machine">Machine Name
        <input type="text" id="machine" name="machine" placeholder="e.g. gpu-dev">
      </label>
      {% endif %}
    </div>
  </fieldset>

  <fieldset>
    <legend>Configuration</legend>
    <div class="grid">
      <label for="agent">Agent
        <select id="agent" name="agent">
          {% for a in agents %}
          <option value="{{ a }}" {{ 'selected' if a == defaults.agent else '' }}>{{ a }}</option>
          {% endfor %}
        </select>
      </label>

      <label for="model">Model
        <div id="model-container">
          {% set da = defaults.agent %}
          {% if agent_models.get(da) and agent_models[da].available %}
          <select id="model" name="model">
            {% for m in agent_models[da].available %}
            <option value="{{ m }}" {{ 'selected' if m == agent_models[da].default else '' }}>{{ m }}</option>
            {% endfor %}
          </select>
          {% else %}
          <input type="text" id="model" name="model" value="{{ agent_models[da].default if agent_models.get(da) else defaults.model }}" placeholder="e.g. opus">
          {% endif %}
        </div>
      </label>

      <label for="max_turns">Max Turns
        <input type="number" id="max_turns" name="max_turns" value="{{ defaults.max_turns }}" min="1">
      </label>
    </div>
  </fieldset>

  <button type="submit">Launch Agent</button>
</form>

<script>
function toggleTask(el) {
  document.getElementById('issue-field').hidden = el.value !== 'issue';
  document.getElementById('message-field').hidden = el.value !== 'adhoc';
}
function toggleTarget(el) {
  document.getElementById('machine-field').hidden = el.value !== 'machine';
}

document.getElementById('agent').addEventListener('change', function() {
  fetch('/api/models/' + this.value)
    .then(r => r.text())
    .then(function(html) {
      document.getElementById('model-container').innerHTML = html;
    });
});
</script>
{% endblock %}
