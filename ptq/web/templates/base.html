<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ptq{% endblock %}</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html-ui-slim.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="container-fluid">
    <ul>
      <li><a href="/"><strong class="nav-brand">ptq</strong></a></li>
    </ul>
    <ul>
      <li><a href="/jobs">Jobs</a></li>
      <li><a href="/jobs/new" role="button" class="outline">New Job</a></li>
    </ul>
  </nav>
  <script>
  function bindPromptLibrary(selectId, textareaId, presets) {
    var select = document.getElementById(selectId);
    var textarea = document.getElementById(textareaId);
    if (!select || !textarea) return;
    select.addEventListener('change', function() {
      var preset = presets.find(function(item) { return item.key === select.value; });
      if (!preset) return;
      textarea.value = preset.body;
      textarea.focus();
    });
  }
  </script>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
